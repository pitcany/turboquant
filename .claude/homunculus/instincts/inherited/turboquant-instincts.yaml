# Turboquant Workflow Integration And Validation Of Patch

## Action

Follow the integration-and-validation-of-patch workflow:
1. Cross-read and verify the upstream/forked codebase to identify integration points and required edits.
2. Fix any latent bugs or mismatches found during integration.
3. Update or create hooks.md to document all required codebase edits.
4. Automate codebase edits with scripts (e.g., apply_hooks.sh) using context anchors for idempotency.
5. Update or extend patch scripts (e.g., patch_ollama_kv_types.sh) to allowlist new types.
6. Add or update smoke/integration test scripts (e.g., smoke_test_tq4p.sh) to verify end-to-end functionality.
7. Run all relevant tests and document results.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: patches/stage2-qjl/hooks.md, patches/stage2-qjl/apply_hooks.sh, patches/stage2-qjl/c/ggml-tq-paper.c

