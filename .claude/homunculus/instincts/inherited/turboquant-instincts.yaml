# Turboquant Workflow Add Or Update Quantization Patch

## Action

Follow the add-or-update-quantization-patch workflow:
1. Draft or update a plan/README documenting the quantization algorithm and validation strategy.
2. Implement or modify C reference code and headers for the quantization algorithm.
3. Implement or update Python reference/oracle and test scripts for byte-exact validation.
4. Generate or update constants using Python scripts and export to C headers.
5. Update or add integration scripts (e.g., build_ollama_tq.sh) to automate patch application and build.
6. Update hooks.md to document required manual or automated edits to upstream/forked code.
7. Add or update test scripts to validate correctness and integration.
8. Update or extend patch scripts (e.g., patch_ollama_kv_types.sh) to allowlist new quantization types.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: patches/stage2-qjl/PLAN.md, patches/stage2-qjl/README.md, patches/stage2-qjl/hooks.md

